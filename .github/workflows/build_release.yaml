name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v1.0.1, etc.
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to publish?'
        required: true
        type: choice
        options:
          - test-pypi
          - pypi
        default: 'test-pypi'
      ref:
        description: 'Git ref (tag/branch) to release from (e.g., v1.0.1 or main)'
        required: false
        type: string
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  authorize:
    name: Authorize Release
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    steps:
      - name: Check authorization
        id: check
        run: |
          AUTHORIZED_USERS="ShubhamKapoor992,amitkumar293"

          ACTOR="${{ github.actor }}"
          echo "Triggered by: $ACTOR"

          if [[ "$AUTHORIZED_USERS" == *"$ACTOR"* ]]; then
            echo "✅ User $ACTOR is authorized to release"
            echo "authorized=true" >> $GITHUB_OUTPUT
          else
            echo "❌ User $ACTOR is NOT authorized to release"
            echo "Authorized users: $AUTHORIZED_USERS"
            echo "authorized=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  build:
    name: Build distribution 📦
    needs: authorize
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install build twine

      - name: Build package
        run: |
          python3 -m build

      - name: Check package
        run: |
          twine check dist/*

      - name: Store the distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  test-install:
    name: Test installation
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Install package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl

      - name: Test import
        run: |
          python -c "from db2_sqlglot import Db2; print('Import successful')"
          python -c "from sqlglot import transpile; result = transpile('SELECT * FROM t LIMIT 10', read='postgres', write='db2'); print(result[0])"

  publish-to-test-pypi:
    name: Publish to Test PyPI
    needs: [build, test-install]
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'test-pypi') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/db2-sqlglot-dialect
    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution 📦 to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build, test-install]
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/db2-sqlglot-dialect
    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
