name: Scans

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

  schedule:
  - cron: "0 2 * * 1"

permissions:
  contents: read

jobs:

  pylint-scan:
    name: Pylint Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          pip install -e .
          if [ -f dev-requirements.txt ]; then
            pip install -r dev-requirements.txt
          fi

      - name: Run Pylint
        run: |
          pylint db2_sqlglot/ --output-format=json > pylint-report.json || true
          pylint db2_sqlglot/ || true

      - name: Upload Pylint Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pylint-quality-report
          path: pylint-report.json

  bandit-scan:
    name: Bandit Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install bandit
           pip install pylint
          pip install -e .
          if [ -f dev-requirements.txt ]; then
            pip install -r dev-requirements.txt
          fi

      - name: Run Bandit
        run: |
          bandit -r db2_sqlglot \
            -f json \
            -o bandit-report.json || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-security-report
          path: bandit-report.json
